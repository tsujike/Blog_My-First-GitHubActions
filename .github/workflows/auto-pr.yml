name: Auto Create Pull Request

on:
  push:
    branches:
      - 'feature/**'

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # fetch-depth: 0 は差分比較の信頼性を上げるため、残しておいて良い
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          # ★★★ 以下の設定に絞る ★★★
          # タイトルと本文
          title: '[Auto PR] New feature from ${{ github.ref_name }}'
          body: |
            This is an auto-generated pull request.
            Please review the changes made in branch `${{ github.ref_name }}`.
