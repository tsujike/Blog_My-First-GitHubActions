name: Auto Create Pull Request

on:
  push:
    branches:
      - 'feature/**'

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          # `base` 以外のオプションを極力減らし、
          # アクションが「pushされたブランチをそのまま使う」モードで
          # 動作するように促す。
          base: develop
          # タイトルと本文は、アクションのデフォルト（コミットメッセージから生成）に
          # 一旦任せてみるのも手。
          # title: ...
          # body: ...
