# ワークフローの名前
name: Auto Create Pull Request

# ワークフローが動き出す「きっかけ」
on:
  push:
    # 今回は、どのブランチがpushされても動くように、ブランチ指定は一旦省略します

# 実行される「作業」
jobs:
  # ジョブの名前
  create-pull-request:
    # 作業する場所
    runs-on: ubuntu-latest

    # 具体的な「手順」
    steps:
      # 手順1: リポジトリのコードを作業場所に持ってくる (必須のおまじない)
      # これがないと、どのブランチの変更なのか分かりません
      - name: Checkout repository
        uses: actions/checkout@v4

      # 手順2: プルリクエストを自動作成するアクションを呼び出す
      # peter-evans/create-pull-request@v6 という名前のアクションを使います
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7.0.8
