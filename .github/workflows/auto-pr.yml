name: Auto Create Pull Request - DEBUG

on:
  push:
    # ★テストのため、一時的に test001 ブランチ名に限定します★
    branches:
      - 'test001'

jobs:
  # ジョブの名前（任意）
  create-pull-request:
    # 作業する場所 (必須のおまじない)
    runs-on: ubuntu-latest

    # 具体的な「手順」
    steps:
      # 手順1: リポジトリのコードを作業場所に持ってくる (必須のおまじない)
      # これがないと、どのブランチの変更なのか分かりません
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 手順2: プルリクエストを自動作成するアクションを呼び出す
      # peter-evans/create-pull-request@v7.0.8 という名前のアクションを使います
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7.0.8
        with:
          # ★★★ 以下の設定に絞る ★★★
          # マージ先のブランチ
          base: main
          # タイトルと本文
          title: '[Auto PR] New feature from ${{ github.ref_name }}'
          body: |
            This is an auto-generated pull request.
            Please review the changes made in branch `${{ github.ref_name }}`.
