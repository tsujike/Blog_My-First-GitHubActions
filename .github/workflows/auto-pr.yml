name: Auto Create Pull Request - DEBUG

on:
  push:
    # ★テストのため、一時的に test001 ブランチ名に限定します★
    branches:
      - 'test001'

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 全ての履歴を取得
          fetch-depth: 0
          # ★デバッグのため、mainブランチも明示的にフェッチする★
          ref: ${{ github.head_ref }}
          fetch-tags: true

      # ★★★ ここからが重要なデバッグステップ ★★★
      - name: 'Debug: List all local branches'
        run: git branch -a

      - name: 'Debug: Show log for current branch (test001)'
        run: git log --oneline -n 10

      - name: 'Debug: Show log for main branch'
        run: |
          git fetch origin main
          git log origin/main --oneline -n 10

      - name: 'Debug: Show diff between current branch and main'
        run: |
          echo "Comparing ${{ github.ref_name }} with origin/main..."
          git diff origin/main...${{ github.ref_name }} --stat

      - name: 'Debug: Show merge base'
        run: |
          echo "Merge base between ${{ github.ref_name }} and origin/main is:"
          git merge-base origin/main ${{ github.ref_name }}
      # ★★★ ここまでデバッグステップ ★★★

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          # タイトルなどを明示的に指定
          title: '[Auto PR] Changes from ${{ github.ref_name }}'
          body: 'Auto-generated PR.'

      - name: Check outputs
        if: ${{ always() }} # 常に実行
        run: |
          echo "Pull Request Number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL: ${{ steps.cpr.outputs.pull-request-url }}"

このワークフローで試していただきたいこと

この内容で .github/workflows/auto-pr.yml を更新し、main ブランチに保存します。

GitHub上で、既存の test001 ブランチを一度削除します。

main ブランチから、再度 test001 という名前で新しいブランチを作成します。

作成した test001 ブランチ上で、README.md に何か新しい変更を加えてコミット（保存）します。

この push をきっかけにワークフローが実行されるので、Actionsタブで実行ログを確認します。

ログで確認すべきポイント:

Debug: Show log for current branch (test001): README.md を更新したコミットが表示されているか？

Debug: Show log for main branch: main ブランチの最新のコミットが表示されているか？

Debug: Show diff between current branch and main: ここで差分が表示されるかどうかが決定的です。

Debug: Show merge base: 2つのブランチの共通の祖先がどこになっているか。

このデバッグログを見れば、Actionsの実行環境がブランチの履歴をどのように認識しているかが明らかになり、なぜ「差分がない」と判断されているのか、その根本原因が必ず特定できるはずです。

度重なる試行錯誤で大変恐縮ですが、このデバッグ手順にご協力いただけますでしょうか。
